services:
  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: production
      ENABLE_LLM: ${ENABLE_LLM:-true}
      ENABLE_DEMO_FALLBACK: ${ENABLE_DEMO_FALLBACK:-true}
      ENABLE_GRAPH_RAG: ${ENABLE_GRAPH_RAG:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-gms}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://gms.ssafy.io/gmsapi/api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-5.5}
      LLM_REASONING_EFFORT: ${LLM_REASONING_EFFORT:-low}
      LLM_MAX_OUTPUT_TOKENS: ${LLM_MAX_OUTPUT_TOKENS:-1024}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-12}
      GRAPH_RAG_BASE_URL: ${GRAPH_RAG_BASE_URL:-}
      GRAPH_RAG_API_KEY: ${GRAPH_RAG_API_KEY:-}
      GRAPH_RAG_TIMEOUT_SECONDS: ${GRAPH_RAG_TIMEOUT_SECONDS:-8}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3100,http://127.0.0.1:3100}
    ports:
      - "4100:4100"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_HEOGAON_API_BASE_URL: ${NEXT_PUBLIC_HEOGAON_API_BASE_URL:-http://127.0.0.1:4100}
    environment:
      NEXT_PUBLIC_HEOGAON_API_BASE_URL: ${NEXT_PUBLIC_HEOGAON_API_BASE_URL:-http://127.0.0.1:4100}
    depends_on:
      - backend
    ports:
      - "80:3100"
    restart: unless-stopped
